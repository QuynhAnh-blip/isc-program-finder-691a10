<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

    --accent:#1C5A7C;--accent-soft:#DCEAF1;--gold:#B4771F;--gold-soft:#F4E7CE;

    --serif:Georgia,"Iowan Old Style","Times New Roman",serif;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;--mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;}
  @media (prefers-color-scheme:dark){:root{--ground:#16130F;--surface:#201C17;--surface-2:#2A251F;--line:#37312A;--ink:#EFEAE2;--muted:#A79F94;--faint:#6F6558;
    --accent:#6FB6D6;--accent-soft:#16303D;--gold:#D5A857;--gold-soft:#332813;
    --good:#66BC90;--good-bg:#123023;--warn:#D5A857;--warn-bg:#332813;--bad:#E0765C;--bad-bg:#331810;}}
  :root[data-theme="light"]{--ground:#F5F3EF;--surface:#FFFFFF;--surface-2:#F0EEE9;--line:#E2DED6;--ink:#221E1A;--muted:#6B655C;--faint:#9A9388;--accent:#1C5A7C;--accent-soft:#DCEAF1;--gold:#B4771F;--gold-soft:#F4E7CE;--good:#2E7D5B;--good-bg:#E1F0E8;--warn:#9C6B20;--warn-bg:#F4E7CE;--bad:#AE4029;--bad-bg:#F5E0D9;}
  :root[data-theme="dark"]{--ground:#16130F;--surface:#201C17;--surface-2:#2A251F;--line:#37312A;--ink:#EFEAE2;--muted:#A79F94;--faint:#6F6558;--accent:#6FB6D6;--accent-soft:#16303D;--gold:#D5A857;--gold-soft:#332813;--good:#66BC90;--good-bg:#123023;--warn:#D5A857;--warn-bg:#332813;--bad:#E0765C;--bad-bg:#331810;}
  *{box-sizing:border-box}body{margin:0;background:var(--ground);color:var(--ink);font-family:var(--sans);font-size:15.5px;line-height:1.55;-webkit-font-smoothing:antialiased}
  .wrap{max-width:940px;margin:0 auto;padding:clamp(20px,4vw,40px) clamp(14px,3vw,26px)}
  .hero{text-align:center;margin-bottom:26px}
  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin:0 0 10px}
  h1{font-family:var(--serif);font-weight:600;font-size:clamp(30px,5.5vw,48px);line-height:1.04;letter-spacing:-.01em;margin:0 0 10px}
  .hero p{color:var(--muted);margin:0 auto;max-width:52ch;font-size:clamp(15px,2vw,17px)}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:clamp(16px,3vw,24px);box-shadow:0 1px 2px rgba(0,0,0,.03)}
  form.finder{display:grid;grid-template-columns:1fr 1fr;gap:14px 16px}
  .f{display:flex;flex-direction:column;gap:6px}.f.wide{grid-column:1/-1}
  label{font-size:13px;font-weight:600;color:var(--ink)}
  label .hint{font-weight:400;color:var(--faint);font-size:12px}
  input,select{font-family:var(--sans);font-size:15px;padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:var(--ground);color:var(--ink);width:100%}
  input:focus,select:focus{outline:2px solid var(--accent);outline-offset:1px;background:var(--surface)}
  .actions{grid-column:1/-1;display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-top:2px}
  button{font-family:var(--sans);font-size:15px;font-weight:600;padding:12px 22px;border:0;border-radius:10px;background:var(--accent);color:#fff;cursor:pointer}

  .rhead .c{font-family:var(--mono);font-size:12.5px;color:var(--muted)}

  .match .nm{font-size:17px;font-weight:700;line-height:1.25}
  .match .sub{color:var(--muted);font-size:13.5px;margin-top:3px}
  .match .uni{color:var(--accent);font-weight:600}
  .fit{flex:0 0 auto;text-align:center;min-width:62px}
  .fit .pct{font-family:var(--mono);font-size:22px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
  .fit .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);margin-top:3px}

  .b{font-size:12px;font-weight:600;padding:4px 10px;border-radius:999px;display:inline-flex;gap:5px;align-items:center}

  .path h4{margin:0 0 8px;font-size:11px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
  .cw{display:flex;flex-wrap:wrap;gap:7px 8px;align-items:baseline;padding:5px 0;border-top:1px solid var(--line)}.cw:first-of-type{border-top:0}

  .pr{font-family:var(--mono);font-size:11px;padding:1px 6px;border-radius:5px;background:var(--surface-2);color:var(--muted)}
  .pr.hit{background:var(--good-bg);color:var(--good);font-weight:700}
  .toggle{margin-top:11px;font-size:13px;color:var(--accent);cursor:pointer;font-weight:600;user-select:none;background:none;border:0;padding:0}
  .empty{text-align:center;color:var(--faint);padding:36px 12px;font-size:15px}
  .exportbar{display:flex;flex-wrap:wrap;gap:10px 14px;align-items:center;margin:2px 0 6px}
  .expbtn{font-size:14px;padding:9px 16px;border-radius:9px;background:var(--gold);color:#fff;border:0;font-weight:600;cursor:pointer}
  .expbtn:hover{filter:brightness(1.06)}
  .expout{font-size:13px}.expout a{color:var(--accent);font-weight:600}
  .expout .copybtn{margin-left:8px;font-size:12px;padding:3px 9px;border-radius:6px;border:1px solid var(--line);background:var(--surface);color:var(--muted);cursor:pointer;font-weight:600}

  .foot{margin-top:30px;text-align:center;color:var(--faint);font-size:12px;font-family:var(--mono);line-height:1.7}
  @media(max-width:560px){form.finder{grid-template-columns:1fr}}
</style></head><body>
<div class="wrap">
  <div class="hero">
    <p class="eyebrow">ISC Education</p>
    <h1>Program Finder</h1>
    <p>Tell us about your student and we'll match them to programs — with the career and Australian&nbsp;PR pathway each one opens.</p>
  </div>

  <div class="card">
    <form class="finder" id="finder" autocomplete="off">
      <div class="f wide">
        <label>What do they want to study or become? <span class="hint">field, subject, or target job</span></label>
        <input id="interest" list="suggest" placeholder="e.g. Nursing, Data Scientist, Business…">
        <datalist id="suggest"></datalist>
      </div>
      <div class="f">
        <label>Yearly budget <span class="hint">AUD, optional</span></label>
        <input id="budget" type="number" inputmode="numeric" placeholder="e.g. 45000">
      </div>
      <div class="f">
        <label>Student's IELTS <span class="hint">optional</span></label>
        <input id="ielts" type="number" step="0.5" min="0" max="9" placeholder="e.g. 6.5">
      </div>
      <div class="f">
        <label>Target PR state <span class="hint">optional</span></label>
        <select id="pr"><option value="">Any / not sure</option></select>
      </div>
      <div class="f">
        <label>Study level <span class="hint">optional</span></label>
        <select id="level"><option value="">Any level</option></select>
      </div>
      <div class="actions">
        <button type="submit">Find matches →</button>
        <button type="button" class="ghost" id="reset">Clear</button>
        <span class="note" id="datanote"></span>
      </div>
    </form>
  </div>

  <div class="results" id="results"></div>
  <p class="foot" id="foot"></p>
</div>

function relevance(d,q){
  if(!q) return null;                       // interest not used
  q=q.toLowerCase();
  if((d.name||'').toLowerCase().includes(q)) return 1.0;
  if((d.area||'').toLowerCase().includes(q)) return 0.85;
  for(const c of d.careers){ if((c.t+' '+c.o).toLowerCase().includes(q)) return 0.65; }
  return 0;                                  // no interest hit -> filtered out
}
function score(d,inp){
  let earned=0, possible=0, badges=[], rel=relevance(d,inp.q);
  if(inp.q){ possible+=40; earned+=(rel||0)*40; }
  if(inp.budget){ possible+=25;
    if(d.fee && d.fee<=inp.budget){earned+=25;badges.push(['ok','💰 Within budget']);}
    else if(d.fee && d.fee<=inp.budget*1.15){earned+=13;badges.push(['warn','💰 Slightly over ('+money(d.fee)+')']);}
    else if(d.fee){badges.push(['off','💰 Over budget ('+money(d.fee)+')']);}
  }
  if(inp.ielts){ possible+=15;
    if(d.ielts==null){earned+=8;badges.push(['off','🗣 IELTS n/a']);}
    else if(inp.ielts>=d.ielts){earned+=15;badges.push(['ok','🗣 Meets IELTS '+d.ielts]);}
    else {badges.push(['warn','🗣 Needs IELTS '+d.ielts]);}
  }
  let prHit=false;
  if(inp.pr){ possible+=20;
    prHit = d.careers.some(c=>c.pr.includes(inp.pr));
    if(prHit){earned+=20;badges.push(['star','📍 PR pathway in '+inp.pr]);}
    else badges.push(['off','📍 No '+inp.pr+' PR pathway']);
  }
  const fit = possible? Math.round(earned/possible*100) : 100;
  return {fit,badges,rel,prHit};
}
function render(list){

  if(!list.length){R.innerHTML='<div class="empty">No programs match yet. Try widening the budget or clearing the field of study.</div>';return;}
  R.innerHTML = `<div class="rhead"><h2>Matches</h2><span class="c">${list.length} program${list.length>1?'s':''}, best fit first</span></div>
    <div class="exportbar"><button class="expbtn" id="expbtn">⬗ Export these to a spreadsheet (Excel)</button><span class="expout" id="expout"></span></div>`+
    list.map((x,i)=>{const d=x.d;
      const careers = d.careers.map(c=>{
        const pr=c.pr.map(p=>`<span class="pr ${x.inp.pr&&p===x.inp.pr?'hit':''}">${p}</span>`).join(' ');
        return `<div class="cw"><span class="t">${esc(c.t)}</span>${c.a?`<span class="a">${c.a}</span>`:''}<span class="o">${esc(c.o)||'<span style=color:var(--faint)>unmatched</span>'}</span>${pr}</div>`;
      }).join('') || '<span style="color:var(--faint)">No careers listed.</span>';
      return `<div class="match">
        <div class="top">
          <div><div class="nm">${esc(d.name)}</div>
            <div class="sub"><span class="uni">${esc(d.uni)}</span> · ${d.level||'—'} · ${money(d.fee)}/yr · ${d.states.join('/')||'—'} · CRICOS ${d.cricos}</div></div>
          <div class="fit"><div class="pct">${x.fit}%</div><div class="lbl">fit</div></div>
        </div>
        <div class="badges">${x.badges.map(b=>`<span class="b ${b[0]}">${b[1]}</span>`).join('')}</div>
        <button class="toggle" data-i="${i}">Show career pathways (${d.careers.length}) ▾</button>
        <div class="path" id="p${i}"><h4>Career → ANZSCO → PR</h4>${careers}</div>
      </div>`;
    }).join('');
  R.querySelectorAll('.toggle').forEach(b=>b.onclick=()=>{const p=el('p'+b.dataset.i);p.classList.toggle('open');b.textContent=b.textContent.replace(/[▾▴]/,p.classList.contains('open')?'▴':'▾');});
  el('expbtn').onclick=()=>exportDoc(list);
}
async function exportDoc(list){
  const out=el('expout');
  if(!EXPORT){out.className='expout bad';out.textContent='Export isn\'t connected yet — ask your ISC admin to finish the one-time setup.';return;}
  out.className='expout';out.textContent='Generating spreadsheet…';
  const payload={title:'ISC — Program Options'+(lastQuery?': '+lastQuery:''),query:lastQuery,
    matches:list.map(x=>({name:x.d.name,uni:x.d.uni,level:x.d.level,fee:money(x.d.fee)+'/yr',ielts:(x.d.ielts||'—')+'',states:x.d.states.join('/'),careers:x.d.careers}))};
  try{
    const r=await fetch(EXPORT,{method:'POST',body:JSON.stringify(payload)});
    const j=await r.json();
    if(j&&j.ok){out.className='expout ok';out.innerHTML='✓ Spreadsheet ready: <a href="'+j.url+'" target="_blank" rel="noopener">Open in Google Sheets</a> <button class="copybtn" id="cpy">Copy link</button>';el('cpy').onclick=()=>{navigator.clipboard.writeText(j.url);el('cpy').textContent='Copied ✓';};}
    else{out.className='expout bad';out.textContent='Export failed: '+((j&&j.error)||'unknown error');}
  }catch(err){out.className='expout bad';out.textContent='Couldn\'t reach the export service ('+err+').';}
}
function run(e){
  if(e) e.preventDefault();
  const inp={q:el('interest').value.trim(),budget:+el('budget').value||0,ielts:+el('ielts').value||0,pr:el('pr').value,level:el('level').value};
  lastQuery=inp.q;
  let list=DATA.filter(d=>!inp.level||d.level===inp.level)
    .map(d=>{const s=score(d,inp);return {d,inp,...s};})
    .filter(x=>!inp.q || x.rel>0);
  list.sort((a,b)=> b.fit-a.fit || (a.inp.pr?(b.prHit-a.prHit):0) || (a.d.fee||9e9)-(b.d.fee||9e9));
  render(list.slice(0,40));
  el('foot').textContent='Ranked on your inputs only (blank fields are ignored). ★ = the program\'s career maps to an occupation nominated for PR in your target state.';
}
